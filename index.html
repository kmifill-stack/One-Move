  // Beta Tester Unlock System
  const [aboutTapCount, setAboutTapCount] = useState(0);
  const [showBetaUnlock, setShowBetaUnlock] = useState(false);
  const [betaUnlockInput, setBetaUnlockInput] = useState('');

  const [showPaywall, setShowPaywall] = useState(false);
  const FREE_PUZZLE_LIMIT = 60;
  const [showUsernameEdit, setShowUsernameEdit] = useState(false);
  const [tempUsername, setTempUsername] = useState('');
  const [showLevelInfo, setShowLevelInfo] = useState(false);
  // Customization states
  const [selectedIcon, setSelectedIcon] = useState('default');
  const [selectedTheme, setSelectedTheme] = useState('default');
  const [selectedTitle, setSelectedTitle] = useState('');
  const [unlockedIcons, setUnlockedIcons] = useState(['default']);
  const [unlockedThemes, setUnlockedThemes] = useState(['default']);
  const [unlockedTitles, setUnlockedTitles] = useState([]);
  const [showCustomizeShop, setShowCustomizeShop] = useState(false);
  const [customizeTab, setCustomizeTab] = useState('icons'); // 'icons', 'themes', 'titles'

  // Load/save progress
  useEffect(() => {
    const saved = localStorage.getItem('oneMoveSave_v4');
    if (saved) {
      const data = JSON.parse(saved);
      setCurrentPuzzleIndex(data.currentIndex || 0);
      if (data.puzzleDeck && data.puzzleDeck.length === 4) {
        setPuzzleDeck(data.puzzleDeck);
        setDeckPosition(data.deckPosition || 0);
      }
      setTriviaScore(data.triviaScore || 0);
      setPuzzleScore(data.puzzleScore || 0);
      setDailyChallengeGems(data.dailyChallengeGems || 0);
      setGemsSpent(data.gemsSpent || 0);
      setGemsSpentOnCustomization(data.gemsSpentOnCustomization || 0);
      setGemsSpentOn5050(data.gemsSpentOn5050 || 0);
      setGemsSpentOnHints(data.gemsSpentOnHints || 0);
      setGemsSpentOnSkips(data.gemsSpentOnSkips || 0);
      setPuzzlesSkipped(data.puzzlesSkipped || 0);
      setUsedWords(data.usedWords || []);
      setUsedPatterns(data.usedPatterns || []);
      setUsedTrivia(data.usedTrivia || []);
      setRecentCategories(data.recentCategories || []);
      
      // ONE-TIME MIGRATION: Award past level bonuses
      const currentIndex = data.currentIndex || 0;
      const savedBonus = data.bonusGems || 0;
      const savedLevel = data.lastAwardedLevel || '';
      
      // If bonusGems is 0 but player is past level 76, calculate retroactive bonuses
      if (savedBonus === 0 && savedLevel === '' && currentIndex >= 76) {
        let retroactiveBonus = 0;
        let achievedLevel = 'Beginner';
        
        if (currentIndex >= 1500) {
          retroactiveBonus = 75 + 250 + 400 + 700 + 1000 + 1500; // 3925 total
          achievedLevel = 'ONE MOVE Master';
        } else if (currentIndex >= 1000) {
          retroactiveBonus = 75 + 250 + 400 + 700 + 1000; // 2425 total
          achievedLevel = 'The Persistent';
        } else if (currentIndex >= 700) {
          retroactiveBonus = 75 + 250 + 400 + 700; // 1425 total
          achievedLevel = 'Puzzle Architect';
        } else if (currentIndex >= 400) {
          retroactiveBonus = 75 + 250 + 400; // 725 total
          achievedLevel = 'Mind Bender';
        } else if (currentIndex >= 250) {
          retroactiveBonus = 75 + 250; // 325 total
          achievedLevel = 'Logic Master';
        } else if (currentIndex >= 76) {
          retroactiveBonus = 75;
          achievedLevel = 'Pattern Seeker';
        }
        
        if (retroactiveBonus > 0) {
          console.log(`🎁 MIGRATION: Awarding ${retroactiveBonus} retroactive bonus gems for ${achievedLevel} level`);
          setBonusGems(retroactiveBonus);
          setLastAwardedLevel(achievedLevel);
          // Save immediately
          setTimeout(() => {
            localStorage.setItem('oneMoveSave_v4', JSON.stringify({
              ...data,
              bonusGems: retroactiveBonus,
              lastAwardedLevel: achievedLevel
            }));
          }, 100);
        }
      } else {
        // Normal load
        setBonusGems(savedBonus);
        setLastAwardedLevel(savedLevel);
      }
      
      // Load username
      setUsername(data.username || 'Player');
      
      // Load customization data
      setSelectedIcon(data.selectedIcon || 'default');
      setSelectedTheme(data.selectedTheme || 'default');
      setSelectedTitle(data.selectedTitle || '');
      setUnlockedIcons(data.unlockedIcons || ['default']);
      setUnlockedThemes(data.unlockedThemes || ['default']);
      setUnlockedTitles(data.unlockedTitles || []);
      
      // Load premium unlock status
      setIsPremiumUnlocked(data.isPremiumUnlocked || false);
    }
    
    // Load Daily Challenge status
    const dcData = getDailyChallengeData();
    if (dcData) {
      setDailyChallengeCompleted(dcData.completed);
      setDailyChallengeFailed(dcData.failed);
      setDailyChallengeStreak(dcData.streak || 0);
      setTotalDcDaysCompleted(dcData.totalDays || 0);
      setDailyChallengeAttempted(dcData.attempted || false);
      setDailyChallengeGemsAwarded(dcData.gemsAwarded || false);
      setDailyChallengeReplayed(dcData.replayed || false);
      setDailyChallengeInProgress(dcData.inProgress || false);
      setSavedDailyChallengeState(dcData.savedState || null);
      // retryUsed stored separately by date to survive DC resets
      const retryDateStored = localStorage.getItem('dcRetryUsed');
      const todayStr = getTodayDateString();
      setDailyChallengeRetryUsed(retryDateStored === todayStr);
    }
    
    // Load power-up state
    const puData = localStorage.getItem('powerUps');
    if (puData) {
      const pu = JSON.parse(puData);
      setStreakShieldActive(pu.streakShieldActive || false);
      setGemDoublerActive(pu.gemDoublerActive || false);
      setGemDoublerPuzzlesLeft(pu.gemDoublerPuzzlesLeft || 0);
    }
    
    // Streak Shield check — did player miss yesterday?
    const puRaw = localStorage.getItem('powerUps');
    const puCheck = puRaw ? JSON.parse(puRaw) : {};
    if (puCheck.streakShieldActive) {
      const today = getTodayDateString();
      const dcRaw = getDailyChallengeData();
      // If shield is active and today's challenge not yet attempted, check if yesterday was missed
      const shieldDate = puCheck.shieldPurchasedDate;
      if (shieldDate && shieldDate !== today) {
        // Missed a day — prompt to use shield
        setShowStreakShieldPrompt(true);
      }
    }
    
    // Load and update play streak
    const streakData = localStorage.getItem('playStreak');
    if (streakData) {
      const data = JSON.parse(streakData);
      const today = getTodayDateString();
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      const yesterdayStr = `${yesterday.getFullYear()}-${yesterday.getMonth() + 1}-${yesterday.getDate()}`;
      
      if (data.lastPlayed === today) {
        // Already played today
        setPlayStreak(data.streak);
      } else if (data.lastPlayed === yesterdayStr) {
        // Played yesterday, continue streak
        const newStreak = data.streak + 1;
        setPlayStreak(newStreak);
        localStorage.setItem('playStreak', JSON.stringify({
          lastPlayed: today,
          streak: newStreak
        }));
      } else {
        // Streak broken, reset
        setPlayStreak(1);
        localStorage.setItem('playStreak', JSON.stringify({
          lastPlayed: today,
          streak: 1
        }));
      }
    } else {
      // First time playing
      setPlayStreak(1);
      localStorage.setItem('playStreak', JSON.stringify({
        lastPlayed: getTodayDateString(),
        streak: 1
      }));
    }
  }, []);

  // Match Flash advance — useEffect fires with fresh closure, no stale state
  useEffect(() => {
    if (!pendingMFAdvance) return;
    const { index, delay } = pendingMFAdvance;
    const timer = setTimeout(() => {
      setMemoryResult(null);
      setPendingMFAdvance(null);
      if (index >= 100000) { setScreen('complete'); } else { handleNextPuzzle(index); }
    }, delay);
    return () => clearTimeout(timer);
  }, [pendingMFAdvance]);

  // Word Scramble advance — same pattern
  useEffect(() => {
    if (!pendingWSAdvance) return;
    const { index, delay } = pendingWSAdvance;
    const timer = setTimeout(() => {
      setShowCorrectWord(false);
      setShowWordWrong(false);
      setPendingWSAdvance(null);
      if (index >= 100000) { setScreen('complete'); } else { handleNextPuzzle(index); }
    }, delay);
    return () => clearTimeout(timer);
  }, [pendingWSAdvance]);

  // Tile Flip advance
  useEffect(() => {
    if (!pendingTFAdvance) return;
    const { index, delay } = pendingTFAdvance;
    const timer = setTimeout(() => {
      setShowTileSuccess(false);
      setShowTileFailure(false);
      setProcessing(false);
      setPendingTFAdvance(null);
      if (index >= 100000) { setScreen('complete'); } else { handleNextPuzzle(index); }
    }, delay);
    return () => clearTimeout(timer);
  }, [pendingTFAdvance]);

  // Quick Math advance
  useEffect(() => {
    if (!pendingQMAdvance) return;
    const { index, delay } = pendingQMAdvance;
    const timer = setTimeout(() => {
      setShowMathResult(null);
      setMathSelectedAnswer(null);
      setPendingQMAdvance(null);

  // Animate gem counter on home screen
  React.useEffect(() => {
    const total = triviaScore + puzzleScore + dailyChallengeGems + bonusGems - gemsSpent;
    if (gemAnimRef.current) clearInterval(gemAnimRef.current);
    const start = displayedGems;
    const diff = total - start;
    if (diff === 0) return;
    const steps = Math.min(Math.abs(diff), 30);
    const stepSize = diff / steps;
    let current = start;
    let count = 0;
    gemAnimRef.current = setInterval(() => {
      count++;
      current += stepSize;
      setDisplayedGems(Math.round(current));
      if (count >= steps) {
        clearInterval(gemAnimRef.current);
        setDisplayedGems(total);
      }
    }, 30);
    return () => { if (gemAnimRef.current) clearInterval(gemAnimRef.current); };
  }, [triviaScore, puzzleScore, dailyChallengeGems, bonusGems, gemsSpent]);

  };

  const awardGems = (amount, isDaily = false) => {
    if (isDaily) return amount; // No doubler on Daily Challenge
    if (gemDoublerActive && gemDoublerPuzzlesLeft > 0) {
      const newLeft = gemDoublerPuzzlesLeft - 1;
      const doubled = amount * 2;
      setGemDoublerPuzzlesLeft(newLeft);
      if (newLeft <= 0) {
        setGemDoublerActive(false);
        savePowerUps({ gemDoublerActive: false, gemDoublerPuzzlesLeft: 0 });
      } else {
        savePowerUps({ gemDoublerPuzzlesLeft: newLeft });
      }
      return doubled;
    }
    return amount;
  };

      setGemDoublerPuzzlesLeft(newLeft);

    }
  };

  const startDailyChallenge = () => {
    // Check if there's a saved in-progress challenge to resume
    if (dailyChallengeInProgress && savedDailyChallengeState) {
      resumeDailyChallenge();
      return;
    }
    
    // Don't allow if already completed or failed today
    if (dailyChallengeCompleted || dailyChallengeFailed) {
      return;
    }
    
    const challenge = generateDailyChallenge();
    setIsDailyChallenge(true);
    setDailyChallengeAttempted(true);
    setDailyChallengeInProgress(true);
    setCurrentPuzzle(challenge);
    
    if (challenge.type === PUZZLE_TYPES.TILE_FLIP) {
      setCurrentTriviaQuestion(challenge.trivia);
      setGrid(challenge.grid);
      setHintLevel(0);
      setHighlightedArea(null);
      setPuzzleFreezeUsed(false);
      setScreen('puzzle_tile');
    } else if (challenge.type === PUZZLE_TYPES.WORD_SCRAMBLE) {
      setScrambledWord(challenge.scrambled);
      setUserWord('');
      initTileLetters(challenge.scrambled);
      setHintLevel(0);
      setPuzzleFreezeUsed(false);
      setScreen('puzzle_word');
    } else if (challenge.type === PUZZLE_TYPES.MEMORY_MATCH) {
      setMemoryCards(challenge.cards);
      setFlippedCards([]);
      setMatchedPairs([]);
      setMemoryResult(null);
      setSeenCards([]);
      setMfFreezeUsed(false);
      setExplorationComplete(false);
      setWrongAttempts(0);
      setWrongFlashes([]);
      setHintLevel(0);
      const dcFlashSeconds = (challenge.pairs || 3) <= 3 ? 4 : (challenge.pairs || 3) <= 6 ? 6 : 9;
      setFlashPhase(true);
      setFlashCountdown(dcFlashSeconds);
      setScreen('puzzle_memory');
      let count = dcFlashSeconds;
      const ticker = setInterval(() => {
        count--;
        setFlashCountdown(count);
        if (count <= 0) { clearInterval(ticker); setFlashPhase(false); }
      }, 1000);
    } else if (challenge.type === PUZZLE_TYPES.LOGIC_GRID) {
      setLogicGridSelections({});
      setHintLevel(0);
      setScreen('puzzle_logic');
    } else {
      setMathAnswer('');
      setHintLevel(0);
      setPuzzleFreezeUsed(false);
      setFailCount(0);
      setPuzzleFirstAttempt(true);
      setShowMathResult(null);
      setScreen('puzzle_math');
    }
    
    setPuzzleFirstAttempt(true);
    setFailCount(0);
  };

    const savedState = {
      puzzle: currentPuzzle,
      puzzleType: currentPuzzle?.type,

      logicGridSelections,
      // Memory Match state
      memoryCards,

      mathAnswer,

  const resumeDailyChallenge = () => {
    if (!savedDailyChallengeState) return;
    
    const state = savedDailyChallengeState;
    setIsDailyChallenge(true);
    setCurrentPuzzle(state.puzzle);
    
    // Restore state based on puzzle type
    if (state.puzzleType === PUZZLE_TYPES.LOGIC_GRID) {
      setLogicGridSelections(state.logicGridSelections || {});
      setHintLevel(state.hintLevel || 0);
      setScreen('puzzle_logic');
    } else if (state.puzzleType === PUZZLE_TYPES.MEMORY_MATCH) {
      setMemoryCards(state.memoryCards || []);
      setFlippedCards(state.flippedCards || []);
      setMatchedPairs(state.matchedPairs || []);
      setSeenCards(state.seenCards || []);
      setExplorationComplete(state.explorationComplete || false);
      setWrongAttempts(state.wrongAttempts || 0);
      setHintLevel(state.hintLevel || 0);
      setMemoryResult(null);
      setScreen('puzzle_memory');
    } else if (state.puzzleType === PUZZLE_TYPES.WORD_SCRAMBLE) {
      setScrambledWord(state.scrambledWord || '');
      setUserWord(state.userWord || '');
      initTileLetters(state.scrambledWord || '');
      setHintLevel(state.hintLevel || 0);

      setCurrentTriviaQuestion(state.currentTriviaQuestion || null);
      setGrid(state.grid || []);
      setHintLevel(state.hintLevel || 0);
      setHighlightedArea(state.highlightedArea || null);

      setMathAnswer(state.mathAnswer || '');
      setHintLevel(state.hintLevel || 0);

  const playSound = (type) => {
    try {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;
      const audioContext = new AudioContextClass();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      if (type === 'flip') {
        oscillator.frequency.value = 800;
        oscillator.type = 'sine';
        gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.05);
      } else if (type === 'success') {
        oscillator.frequency.value = 523.25;
        oscillator.type = 'sine';
        gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.4);
      }
    } catch (error) {}
  };

      "Beginner": { icon: "🎮", reward: 0, threshold: 0 },

      "Logic Master": { icon: "🥉", reward: 250, threshold: 250 },

  const generateTileFlipPuzzle = (trivia) => {
    const size = currentPuzzleIndex < 10 ? 3 : currentPuzzleIndex < 50 ? 4 : 5;
    const row = Math.floor(Math.random() * size);
    const col = Math.floor(Math.random() * size);
    const patterns = Object.values(FLIP_PATTERNS);
    const availablePatterns = patterns.filter(p => !usedPatterns.slice(-6).includes(p));
    const pattern = availablePatterns.length > 0 
      ? availablePatterns[Math.floor(Math.random() * availablePatterns.length)]
      : patterns[Math.floor(Math.random() * patterns.length)];
    setUsedPatterns([...usedPatterns, pattern].slice(-10)); // Keep last 10
    const colorIndex = Math.floor(currentPuzzleIndex / 7) % TILE_COLORS.length;
    
    const solvedGrid = Array(size).fill(null).map(() => Array(size).fill(1));
    const puzzleGrid = solvedGrid.map(r => [...r]);
    
    const flip = (r, c) => {
      if (r >= 0 && r < size && c >= 0 && c < size) {
        puzzleGrid[r][c] = puzzleGrid[r][c] === 1 ? 0 : 1;
      }
    };
    
    flip(row, col);
    
    switch(pattern) {
      case FLIP_PATTERNS.CROSS:
        flip(row - 1, col);
        flip(row + 1, col);
        flip(row, col - 1);
        flip(row, col + 1);
        break;
      case FLIP_PATTERNS.X_PATTERN:
        flip(row - 1, col - 1);
        flip(row - 1, col + 1);
        flip(row + 1, col - 1);
        flip(row + 1, col + 1);
        break;
      case FLIP_PATTERNS.SQUARE:
        for(let dr = -1; dr <= 1; dr++) {
          for(let dc = -1; dc <= 1; dc++) {
            if(dr !== 0 || dc !== 0) flip(row + dr, col + dc);
          }
        }
        break;
    }
    
    return {
      type: PUZZLE_TYPES.TILE_FLIP,
      grid: puzzleGrid,
      solution: { row, col },
      pattern,
      size,
      colorIndex,
      trivia
    };
  };

  const generateWordScramble = () => {
    // Pick random word from scramble bank (5+ letters only), avoiding recently used words
    let scrambleItem;
    let attempts = 0;
    do {
      scrambleItem = SCRAMBLE_BANK[Math.floor(Math.random() * SCRAMBLE_BANK.length)];
      attempts++;
    } while ((usedWords.includes(scrambleItem.word) || scrambleItem.word.replace(/\s/g, '').length < 5) && attempts < 100);
    
    // Add word to used list and maintain 500-word buffer
    const newUsedWords = [...usedWords, scrambleItem.word];
    if (newUsedWords.length > 500) {
      newUsedWords.shift(); // Remove oldest word
    }
    setUsedWords(newUsedWords);
    saveProgress({ usedWords: newUsedWords });
    
    const word = scrambleItem.word;
    
    // Handle multi-word phrases by scrambling each word separately and joining with underscore
    let scrambledText;
    if (word.includes(' ')) {
      // Multi-word: scramble each word separately, join with underscore
      const words = word.split(' ');
      const scrambledWords = words.map(w => {
        const letters = w.split('');
        for (let i = letters.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [letters[i], letters[j]] = [letters[j], letters[i]];
        }
        return letters.join('');
      });
      scrambledText = scrambledWords.join(' _ ');
    } else {
      // Single word: scramble normally
      const letters = word.split('');
      for (let i = letters.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [letters[i], letters[j]] = [letters[j], letters[i]];
      }
      scrambledText = letters.join('');
    }
    
    return {
      type: PUZZLE_TYPES.WORD_SCRAMBLE,
      scrambled: scrambledText,
      answer: word,
      category: scrambleItem.cat
    };
  };

        // Filter out recently used questions
        const available = QUICK_MATH_WRITTEN_POOL.filter((_, idx) => !usedWritten.includes(idx));
        const pool = available.length > 0 ? available : QUICK_MATH_WRITTEN_POOL;
        
        // Pick a random question from available pool
        const allIndices = pool === QUICK_MATH_WRITTEN_POOL 
          ? QUICK_MATH_WRITTEN_POOL.map((_, i) => i)
          : QUICK_MATH_WRITTEN_POOL.map((_, i) => i).filter(i => !usedWritten.includes(i));
        
        const randomIndex = allIndices[Math.floor(Math.random() * allIndices.length)];
        const selected = QUICK_MATH_WRITTEN_POOL[randomIndex];
        
        // Update buffer (keep last 50)
        const newUsed = [...usedWritten, randomIndex].slice(-50);
        localStorage.setItem('usedRegularMath', JSON.stringify(newUsed));
        
        // Shuffle choices
        const shuffled = [...selected.choices];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        
        return {
          type: PUZZLE_TYPES.QUICK_MATH,
          question: selected.question,
          answer: selected.answer,
          choices: shuffled
        };
      }

      // Procedural fast-calc (70%) — scaled difficulty
      if (currentPuzzleIndex < 50) {
        // Easy: Addition & Subtraction (single digit)
        operation = Math.random() < 0.5 ? '+' : '-';
        num1 = Math.floor(Math.random() * 10) + 1;
        num2 = Math.floor(Math.random() * 10) + 1;
        if (operation === '-' && num2 > num1) [num1, num2] = [num2, num1];
        answer = operation === '+' ? num1 + num2 : num1 - num2;
      } else if (currentPuzzleIndex < 150) {
        // Medium: Multiplication & Division (tables up to 10)
        operation = Math.random() < 0.5 ? '×' : '÷';
        if (operation === '×') {
          num1 = Math.floor(Math.random() * 10) + 1;
          num2 = Math.floor(Math.random() * 10) + 1;
          answer = num1 * num2;
        } else {
          answer = Math.floor(Math.random() * 10) + 1;
          num2 = Math.floor(Math.random() * 10) + 1;
          num1 = answer * num2;
        }
      } else {
        // Hard: Mixed operations, larger numbers
        const ops = ['+', '-', '×', '÷'];
        operation = ops[Math.floor(Math.random() * ops.length)];
        if (operation === '+') {
          num1 = Math.floor(Math.random() * 50) + 10;
          num2 = Math.floor(Math.random() * 50) + 10;
          answer = num1 + num2;
        } else if (operation === '-') {
          num1 = Math.floor(Math.random() * 80) + 20;
          num2 = Math.floor(Math.random() * (num1 - 10)) + 1;
          answer = num1 - num2;
        } else if (operation === '×') {
          num1 = Math.floor(Math.random() * 12) + 2;
          num2 = Math.floor(Math.random() * 12) + 2;
          answer = num1 * num2;
        } else {
          answer = Math.floor(Math.random() * 15) + 2;
          num2 = Math.floor(Math.random() * 12) + 2;
          num1 = answer * num2;
        }
      }

      // Generate 3 wrong answers for procedural questions
      choices = [answer];

        let wrong = answer + Math.floor(Math.random() * 20) - 10;

        [choices[i], choices[j]] = [choices[j], choices[i]];

        type: PUZZLE_TYPES.QUICK_MATH,

  const applyFlipPattern = (row, col, gridCopy, pattern) => {
    const flip = (r, c) => {
      if (r >= 0 && r < gridCopy.length && c >= 0 && c < gridCopy[0].length) {
        gridCopy[r][c] = gridCopy[r][c] === 1 ? 0 : 1;
      }
    };
    
    flip(row, col);
    
    switch(pattern) {
      case FLIP_PATTERNS.CROSS:
        flip(row - 1, col);
        flip(row + 1, col);
        flip(row, col - 1);
        flip(row, col + 1);
        break;
      case FLIP_PATTERNS.X_PATTERN:
        flip(row - 1, col - 1);
        flip(row - 1, col + 1);
        flip(row + 1, col - 1);
        flip(row + 1, col + 1);
        break;
      case FLIP_PATTERNS.SQUARE:
        for(let dr = -1; dr <= 1; dr++) {
          for(let dc = -1; dc <= 1; dc++) {

                  setIsDailyChallenge(false);
                  setTimeout(() => { setShowDailyChallengeResult(true); setDailyChallengeReward(0); }, 2000);
                  return;
                }
                setPuzzleFirstAttempt(false);
                setFailCount(prev => prev + 1);
                setShowWordWrong(true);
                if (!puzzleFreezeUsed) {
                  if (streakFreezeActive) { setStreakFreezeActive(false); } else { resetStreak(); }
                  setPuzzleFreezeUsed(true);
                }
                burnDoublerUse();
                const wsWrongIndex = currentPuzzleIndex + 1;
                setCurrentPuzzleIndex(wsWrongIndex);
                saveProgress({ currentIndex: wsWrongIndex });
                setTimeout(() => checkLevelUp(), 100);
                setPendingWSAdvance({ index: wsWrongIndex, delay: 3000 });
              }
            }} disabled={!allPlaced || showCorrectWord || showWordWrong}
              className={`flex-grow py-3 rounded-xl text-base font-bold transition-all duration-200 ${allPlaced && !showCorrectWord && !showWordWrong ? 'bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white shadow-lg active:scale-95' : 'bg-slate-700 text-slate-500 cursor-not-allowed'}`}>
              {allPlaced ? '✓ Submit' : `${placedTiles.length} / ${totalLetters}`}
            </button>
          </div>

          {/* HINTS */}
          <div className="space-y-2">
            <button onClick={handleHint1} disabled={totalGems < 50 || hintLevel >= 1}
              className={`w-full px-4 py-2 rounded-lg text-sm transition-all ${totalGems < 50 || hintLevel >= 1 ? 'bg-slate-700 text-slate-500 cursor-not-allowed' : 'bg-purple-600 hover:bg-purple-700 text-white'}`}>
              💡 Hint 1: First Letter (-50 gems) {hintLevel >= 1 ? '✓' : ''}
            </button>
            {hintLevel >= 1 && (
              <button onClick={handleHint2} disabled={totalGems < 100 || hintLevel >= 2}
                className={`w-full px-4 py-2 rounded-lg text-sm transition-all ${totalGems < 100 || hintLevel >= 2 ? 'bg-slate-700 text-slate-500 cursor-not-allowed' : 'bg-purple-600 hover:bg-purple-700 text-white'}`}>
                💡 Hint 2: First 3 Letters (-100 gems) {hintLevel >= 2 ? '✓' : ''}
              </button>
            )}
            {hintLevel >= 2 && (
              <button onClick={handleHint3} disabled={totalGems < 150 || hintLevel >= 3}
                className={`w-full px-4 py-2 rounded-lg text-sm transition-all ${totalGems < 150 || hintLevel >= 3 ? 'bg-slate-700 text-slate-500 cursor-not-allowed' : 'bg-purple-600 hover:bg-purple-700 text-white'}`}>
                💡 Hint 3: All But Last 2 (-150 gems) {hintLevel >= 3 ? '✓' : ''}
              </button>
            )}
            {hintLevel >= 3 && (
              <button onClick={handleHint4} disabled={totalGems < 200 || hintLevel >= 4}
                className={`w-full px-4 py-2 rounded-lg text-sm transition-all ${totalGems < 200 || hintLevel >= 4 ? 'bg-slate-700 text-slate-500 cursor-not-allowed' : 'bg-purple-600 hover:bg-purple-700 text-white'}`}>
                💡 Hint 4: Full Answer (-200 gems) {hintLevel >= 4 ? '✓' : ''}
              </button>
            )}
          </div>

          <button onClick={() => setShowSkipConfirm(true)} className="w-full px-6 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm transition-all duration-300">
            ⏭️ Skip Puzzle (-200 💎)
          </button>
        </div>

        {showSkipConfirm && (
          <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-6" onClick={() => setShowSkipConfirm(false)}>
            <div className="bg-slate-800 rounded-2xl p-8 max-w-md border-2 border-red-500" onClick={(e) => e.stopPropagation()}>
              <h2 className="text-2xl font-light text-white text-center mb-4">Skip This Puzzle?</h2>
              <p className="text-slate-300 text-center mb-2">Costs 200 gems</p>
              <p className="text-slate-400 text-center text-sm mb-6">You won't earn any gems for this puzzle.</p>
              <div className="flex gap-4">
                <button onClick={() => setShowSkipConfirm(false)} className="flex-1 px-6 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-lg transition-all duration-300">Cancel</button>
                <button onClick={handleSkipPuzzle} className="flex-1 px-6 py-3 bg-red-600 hover:bg-red-700 text-white rounded-lg transition-all duration-300">Skip</button>
              </div>
            </div>
          </div>

      </div>

  }

  // Quick Math Puzzle Screen
  if (screen === 'puzzle_math' && currentPuzzle) {
    const totalGems = triviaScore + puzzleScore + dailyChallengeGems + bonusGems - gemsSpent;
    
    const handleMathAnswer = (selected) => {
      if (showMathResult) return; // Prevent double tap
      setMathSelectedAnswer(selected);
      if (selected === currentPuzzle.answer) {
        // CORRECT!
        playSound('success');  // ADD SUCCESS SOUND
        setShowMathResult('correct');
        
        // Check if this is Daily Challenge
        if (isDailyChallenge)  {
 			 handleDailyChallengeSuccess();
  			return;
		}        
        if (puzzleFirstAttempt) {
          setPuzzleScore(puzzleScore + awardGems(100));
          handleCorrectStreak();
        } else {
          resetStreak();
        }
        
        // Check level up
        setTimeout(() => checkLevelUp(), 100);
        
        // Advance to next puzzle
        const mathNextIndex = currentPuzzleIndex + 1;
        setCurrentPuzzleIndex(mathNextIndex);
        saveProgress({ currentIndex: mathNextIndex });
        
        setPendingQMAdvance({ index: mathNextIndex, delay: 1500 });
      } else {
        // WRONG! - Auto-advance immediately (one attempt only)
        setShowMathResult('wrong');
        
        // Check if Daily Challenge FIRST
        if (isDailyChallenge) {
          // Daily Challenge FAILED - one attempt only!
          saveDailyChallengeData(false, true, dailyChallengeStreak, false, false, false, null);
          setDailyChallengeFailed(true);
          setDailyChallengeInProgress(false);
          setSavedDailyChallengeState(null);
          setIsDailyChallenge(false);
          
          setTimeout(() => {
            setShowMathResult(null);
            setShowDailyChallengeResult(true);
            setDailyChallengeReward(0);
          }, 1500);
          
          return;
        }
        
        // Regular game - wrong answer means auto-advance
        setPuzzleFirstAttempt(false);
        setFailCount(failCount + 1);
        if (!puzzleFreezeUsed) {
          if (streakFreezeActive) { setStreakFreezeActive(false); } else { resetStreak(); }
          setPuzzleFreezeUsed(true);
        }
        burnDoublerUse();
        const mathWrongIndex = currentPuzzleIndex + 1;
        setCurrentPuzzleIndex(mathWrongIndex);
        saveProgress({ currentIndex: mathWrongIndex });
        
        setTimeout(() => checkLevelUp(), 100);
        setPendingQMAdvance({ index: mathWrongIndex, delay: 1500 });
      }
    };
    
    return (
      <div className="min-h-screen bg-gradient-to-br from-purple-950 via-blue-900 to-slate-900 flex items-center justify-center p-4">
        {!isDailyChallenge && (
          <>
            <button

              className="absolute top-4 left-4 p-2 text-slate-400 hover:text-white transition-all duration-200 z-50"

              <Home className="w-5 h-5" />

            <div className="absolute top-4 right-4 z-50 flex items-center gap-1 bg-slate-800/70 rounded-full px-3 py-1">

        <div className="space-y-6 max-w-md w-full">

                <p className="text-amber-100 text-xs">One attempt • Win 500 Gems!</p>

              <button
                onClick={pauseAndSaveDailyChallenge}

                <span>💾</span>
                <span>Pause & Save for Later</span>
              </button>
            </div>

          <div className="text-center mb-4">
            {!isDailyChallenge && (
            <div className="flex items-center justify-center gap-2 mb-2">
              <div className={`flex items-center gap-1.5 px-2 py-0.5 rounded-full ${streakFreezeActive ? 'bg-cyan-500/20 border border-cyan-400/50' : ''}`}>

                <span className={`font-bold text-sm ${streakFreezeActive ? 'text-cyan-300' : 'text-white'}`}>{correctStreak}</span>
                <span className="text-slate-400 text-xs">streak</span>
                {streakFreezeActive && <span className="text-cyan-400 text-xs font-bold">FROZEN</span>}
              </div>
              {!streakFreezeActive && correctStreak > 0 && (
                <button
                  onClick={() => {
                    const totalGems = triviaScore + puzzleScore + dailyChallengeGems + bonusGems - gemsSpent;
                    if (totalGems < 150) { alert('Not enough gems! Need 150 💎'); return; }
                    const newSpent = gemsSpent + 150;
                    setGemsSpent(newSpent);
                    saveProgress({ gemsSpent: newSpent });
                    setStreakFreezeActive(true);
                  }}
                  className="flex items-center gap-1 px-2 py-0.5 bg-cyan-600/30 border border-cyan-500/50 rounded-full hover:bg-cyan-600/50 transition-all active:scale-95"
                >
                  <span className="text-xs">🧊</span>
                  <span className="text-cyan-300 text-xs font-semibold">150 💎</span>
                </button>
              )}
            </div>
          )}
            <p className="text-white text-lg font-light">Quick Math</p>
            <p className="text-slate-400 text-sm mt-1">Solve the problem!</p>

          </div>
          
          {/* Correct/Wrong Feedback */}
          {showMathResult && (
            <div className="text-center mb-6 animate-pulse">
              {showMathResult === 'correct' ? (
                <p className="text-green-400 text-6xl font-bold">
                  CORRECT! ✓
                </p>
              ) : (
                <p className="text-red-400 text-5xl font-bold">
                  ALMOST!
                </p>
              )}
            </div>
          )}
          
          {/* Math Question */}
          <div className="bg-slate-700/50 rounded-xl p-8 text-center border-2 border-slate-600">
            <p className="text-white text-2xl font-bold">{currentPuzzle.question}</p>
          </div>
          
          {/* Answer Choices */}
          <div className="grid grid-cols-2 gap-3">
            {currentPuzzle.choices.map((choice, idx) => (
              <button
                key={idx}
                onClick={() => handleMathAnswer(choice)}
                disabled={!!showMathResult}
                className={`rounded-xl p-6 text-3xl font-bold transition-all duration-300 shadow-lg
                  ${showMathResult && choice === currentPuzzle.answer
                    ? 'bg-gradient-to-br from-green-500 to-green-600 text-white scale-105'
                    : showMathResult && choice === mathSelectedAnswer
                    ? 'bg-gradient-to-br from-red-500 to-red-600 text-white'
                    : showMathResult
                    ? 'bg-slate-700 text-slate-400 opacity-50'
                    : 'bg-gradient-to-br from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white active:scale-95'
                  }`}
              >
                {choice}
              </button>
            ))}
          </div>
          
          {/* Skip Button - Hidden during Daily Challenge */}
          {!isDailyChallenge && (
            <button
              onClick={() => setShowSkipConfirm(true)}
              className="w-full mt-4 px-6 py-3 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-lg transition-all duration-300 text-sm"
            >
              ⏭️ Skip Puzzle (-200 💎)
            </button>
          )}
        </div>
        
        {/* Skip Confirmation */}
        {showSkipConfirm && (
          <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-6">
            <div className="bg-slate-800 rounded-2xl p-8 max-w-sm border-2 border-red-500">
              <h3 className="text-2xl font-light text-white text-center mb-4">Skip Puzzle?</h3>
              <p className="text-slate-300 text-center mb-6">This will cost 200 gems and you won't earn puzzle completion gems.</p>
              
              <div className="flex gap-4">
                <button
                  onClick={() => setShowSkipConfirm(false)}
                  className="flex-1 px-6 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-lg transition-all duration-300"
                >
                  Cancel
                </button>
                <button
                  onClick={handleSkipPuzzle}
                  className="flex-1 px-6 py-3 bg-red-600 hover:bg-red-700 text-white rounded-lg transition-all duration-300"
                >
                  Skip
                </button>
              </div>
            </div>
          </div>
        )}
      
      {/* Streak Celebration — Global */}
      {showStreakCelebration && (
        <div className="fixed inset-0 flex items-center justify-center z-[999] pointer-events-none">
          <div className="bg-gradient-to-br from-orange-500 to-amber-500 rounded-3xl px-10 py-8 text-center shadow-2xl animate-bounce">
            <p className="text-white text-5xl mb-2">🔥</p>
            <p className="text-white text-3xl font-bold">{showStreakCelebration} IN A ROW!</p>
            <p className="text-orange-100 text-sm mt-1">You're on fire! Keep it up!</p>
          </div>
        </div>
      )}
      </div>
    );
  }

  // Memory Match Puzzle Screen
  if (screen === 'puzzle_memory' && currentPuzzle) {
    const totalGems = triviaScore + puzzleScore + dailyChallengeGems + bonusGems - gemsSpent;
    const gridCols = currentPuzzle.pairs <= 3 ? 3 : 4;
    const maxTaps = currentPuzzle.pairs <= 3 ? 4 : currentPuzzle.pairs <= 6 ? 5 : 6;
    const tapsRemaining = maxTaps - wrongAttempts;

    const handleCardClick = (cardId) => {
      if (flashPhase || memoryResult) return; // No taps during flash or result
      const card = memoryCards.find(c => c.id === cardId);
      if (!card || card.isMatched || flippedCards.includes(cardId)) return;

      // PEEK MODE — flip one card briefly then hide it
      if (peekMode) {
        setPeekMode(false);
        setPeekCardId(cardId);
        setTimeout(() => setPeekCardId(null), 2000);
        return;
      }

      if (flippedCards.length >= 2) return;

      const newFlipped = [...flippedCards, cardId];
      setFlippedCards(newFlipped);

      if (newFlipped.length === 2) {
        const card1 = memoryCards.find(c => c.id === newFlipped[0]);
        const card2 = memoryCards.find(c => c.id === newFlipped[1]);

        if (card1.emoji === card2.emoji) {
          // MATCH!
          const newMatched = [...matchedPairs, card1.emoji];
          setMatchedPairs(newMatched);
          const updatedCards = memoryCards.map(c =>
            c.id === card1.id || c.id === card2.id ? {...c, isMatched: true} : c
          );
          setMemoryCards(updatedCards);
          setFlippedCards([]);

          if (newMatched.length === currentPuzzle.pairs) {
            // ALL MATCHED — WIN!
            playSound('success');
            setMemoryResult('perfect');
            if (isDailyChallenge) { handleDailyChallengeSuccess(); return; }
            const mfGems = awardGems(100);
            const newPuzzleScore = puzzleScore + mfGems;
            setPuzzleScore(newPuzzleScore);
            handleCorrectStreak();
            saveProgress({ puzzleScore: newPuzzleScore });
            const mfNextIndex = currentPuzzleIndex + 1;
            setCurrentPuzzleIndex(mfNextIndex);
            saveProgress({ currentIndex: mfNextIndex });
            setTimeout(() => checkLevelUp(), 100);
            // Use state-driven advance to avoid stale closure in setTimeout
            setPendingMFAdvance({ index: mfNextIndex, delay: 3000 });
          }
        } else {
          // WRONG PAIR — flash red then flip back
          setWrongFlashes([card1.id, card2.id]);
          setTimeout(() => {
            setWrongFlashes([]);
            setFlippedCards([]);
            const newWrong = wrongAttempts + 1;
            setWrongAttempts(newWrong);
            // Only call resetStreak once per puzzle — freeze protects the whole puzzle
            if (!mfFreezeUsed) {
              if (streakFreezeActive) {
                setStreakFreezeActive(false);
                setMfFreezeUsed(true);
              } else {
                resetStreak();
                setMfFreezeUsed(true);
              }
            }
            burnDoublerUse();

            if (newWrong >= maxTaps) {
              // Out of taps
              if (isDailyChallenge) {
                saveDailyChallengeData(false, true, dailyChallengeStreak, false, false, false, null);
                setDailyChallengeFailed(true);
                setDailyChallengeInProgress(false);
                setSavedDailyChallengeState(null);
                setIsDailyChallenge(false);
                setMemoryResult('failed');
                setTimeout(() => { setMemoryResult(null); setShowDailyChallengeResult(true); setDailyChallengeReward(0); }, 3000);
                return;
              }
              setMemoryResult('failed');
              const mfFailIndex = currentPuzzleIndex + 1;
              setCurrentPuzzleIndex(mfFailIndex);
              saveProgress({ currentIndex: mfFailIndex });
              setTimeout(() => checkLevelUp(), 100);
              setPendingMFAdvance({ index: mfFailIndex, delay: 3000 });
            }
          }, 800);
        }
      }
    };

    return (
      <div className="min-h-screen bg-gradient-to-br from-purple-950 via-blue-900 to-slate-900 flex items-center justify-center p-4">
        {!isDailyChallenge && (
          <>
            <button onClick={handleHomeClick} className="absolute top-4 left-4 p-2 text-slate-400 hover:text-white transition-all duration-200 z-50">
              <Home className="w-5 h-5" />
            </button>
            <div className="absolute top-4 right-4 z-50 flex items-center gap-1 bg-slate-800/70 rounded-full px-3 py-1">
              <span className="text-yellow-400 text-sm">💎</span>
              <span className="text-white text-sm font-bold">{totalGems}</span>
            </div>
          </>
        )}

        <div className="space-y-5 max-w-md w-full mx-auto">

          {/* Result overlay */}
          {memoryResult && (
            <div className="fixed inset-0 flex items-center justify-center z-50 pointer-events-none">
              <div className={`rounded-3xl px-10 py-8 text-center shadow-2xl ${memoryResult === 'perfect' ? 'bg-green-600/95' : 'bg-red-500/90'}`}>
                <p className="text-white text-6xl mb-2">{memoryResult === 'perfect' ? '🏆' : '💪'}</p>
                <p className="text-white text-3xl font-bold">{memoryResult === 'perfect' ? 'PERFECT MATCH!' : 'ALMOST!'}</p>
                {memoryResult === 'perfect' && <p className="text-green-200 text-lg mt-1">+100 gems!</p>}
                {memoryResult === 'failed' && <p className="text-red-100 text-sm mt-1">Moving to next puzzle...</p>}
              </div>
            </div>
          )}

          {isDailyChallenge && (
            <div className="space-y-2">
              <div className="bg-gradient-to-r from-purple-600 to-purple-700 rounded-lg p-2 text-center">
                <p className="text-white font-bold text-sm">🏆 DAILY CHALLENGE</p>
                <p className="text-amber-100 text-xs">One attempt • Win 500 Gems!</p>
              </div>
              <button onClick={pauseAndSaveDailyChallenge} className="w-full px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg transition-all text-sm font-semibold flex items-center justify-center gap-2">
                <span>💾</span><span>Pause & Save for Later</span>
              </button>
            </div>
          )}

          {/* Header */}
          <div className="text-center">
            {!isDailyChallenge && (
            <div className="flex items-center justify-center gap-2 mb-2">
              <div className={`flex items-center gap-1.5 px-2 py-0.5 rounded-full ${streakFreezeActive ? 'bg-cyan-500/20 border border-cyan-400/50' : ''}`}>
                <span className="text-base">{streakFreezeActive ? '🧊' : correctStreak >= 10 ? '🔥' : correctStreak >= 5 ? '⚡' : '🎯'}</span>
                <span className={`font-bold text-sm ${streakFreezeActive ? 'text-cyan-300' : 'text-white'}`}>{correctStreak}</span>
                <span className="text-slate-400 text-xs">streak</span>
                {streakFreezeActive && <span className="text-cyan-400 text-xs font-bold">FROZEN</span>}
              </div>
              {!streakFreezeActive && correctStreak > 0 && (
                <button
                  onClick={() => {
                    const totalGems = triviaScore + puzzleScore + dailyChallengeGems + bonusGems - gemsSpent;
                    if (totalGems < 150) { alert('Not enough gems! Need 150 💎'); return; }
                    const newSpent = gemsSpent + 150;
                    setGemsSpent(newSpent);
                    saveProgress({ gemsSpent: newSpent });
                    setStreakFreezeActive(true);
                  }}
                  className="flex items-center gap-1 px-2 py-0.5 bg-cyan-600/30 border border-cyan-500/50 rounded-full hover:bg-cyan-600/50 transition-all active:scale-95"
                >
                  <span className="text-xs">🧊</span>
                  <span className="text-cyan-300 text-xs font-semibold">150 💎</span>
                </button>
              )}
            </div>
          )}
            <p className="text-white text-lg font-light">Match Flash</p>
            {flashPhase ? (
              <div className="mt-1">
                <p className="text-yellow-300 text-sm font-bold">⚡ Memorize! Hiding in {flashCountdown}...</p>
              </div>
            ) : (
              <div className="flex items-center justify-center gap-2 mt-1">
                {[...Array(maxTaps)].map((_, i) => (
                  <div key={i} className={`w-3 h-3 rounded-full ${i < tapsRemaining ? 'bg-green-400' : 'bg-red-500'}`} />
                ))}
                <p className="text-slate-300 text-xs ml-1">{tapsRemaining} tap{tapsRemaining !== 1 ? 's' : ''} left</p>
              </div>
            )}
          </div>

          {/* Card Grid */}
          <div className={`grid gap-3 ${gridCols === 3 ? 'grid-cols-3' : 'grid-cols-4'} max-w-sm mx-auto`}>
            {memoryCards.map((card) => {
              const isVisible = flashPhase || flippedCards.includes(card.id) || card.isMatched || peekCardId === card.id;
              const isWrongFlash = wrongFlashes.includes(card.id);
              const isPeeking = peekCardId === card.id;
              const isPeekTarget = peekMode && !card.isMatched && !flippedCards.includes(card.id);
              return (
                <button
                  key={card.id}
                  onClick={() => handleCardClick(card.id)}
                  disabled={flashPhase || !!memoryResult}
                  className={`aspect-square rounded-xl text-5xl font-bold transition-all duration-300 shadow-lg flex items-center justify-center
                    ${card.isMatched
                      ? 'bg-gradient-to-br from-green-500 to-green-600 scale-95'
                      : isWrongFlash
                      ? 'bg-gradient-to-br from-red-500 to-red-600 scale-95'
                      : isPeeking
                      ? 'bg-gradient-to-br from-yellow-400 to-amber-500 scale-105 ring-2 ring-yellow-300'
                      : isPeekTarget
                      ? 'bg-gradient-to-br from-purple-500 to-purple-600 ring-2 ring-yellow-400 animate-pulse cursor-pointer'
                      : isVisible
                      ? 'bg-gradient-to-br from-blue-500 to-blue-600'
                      : 'bg-gradient-to-br from-purple-600 to-purple-700 hover:from-purple-500 hover:to-purple-600 active:scale-95'
                    }`}
                >
                  {isVisible ? card.emoji : '?'}
                </button>
              );
            })}
          </div>

          {/* Progress */}
          {!flashPhase && (
            <div className="text-center">
              <p className="text-slate-400 text-sm">Matched: {matchedPairs.length} / {currentPuzzle.pairs}</p>
            </div>
          )}

          {/* Peek Hint Button — regular play only, after flash phase */}
          {!flashPhase && !isDailyChallenge && !memoryResult && matchedPairs.length < currentPuzzle.pairs && (
            <button
              onClick={() => {
                if (peekMode) {
                  // Cancel peek mode
                  setPeekMode(false);
                  return;
                }
                if (totalGems < 75) {
                  alert('Not enough gems! You need 75 gems for a peek hint.');
                  return;
                }
                const newSpent = gemsSpent + 75;
                setGemsSpent(newSpent);
                saveProgress({ gemsSpent: newSpent });
                setPeekMode(true);
              }}

            personCorrect = false;
            break;
          }

          // Check if this person has all categories filled
          let allFilled = true;
          for (let i = 1; i < categories.length; i++) {
            if (!logicGridSelections[person]?.[categories[i]]) {
              allFilled = false;
              break;

          }
          if (allFilled) correctCount++;
        }
      }
      return correctCount;

          const correctAnswer = solution[person]?.[category];
          
          console.log(`${person} - ${category}: ${userAnswer} vs ${correctAnswer}`);
          
          if (userAnswer !== correctAnswer) {
            correct = false;

          const category = categories[i];

  // Complete Screen
  if (screen === 'complete') {

  return (
    <>

      {/* Global Streak Celebration — shows on any screen */}
      {showStreakCelebration && (
        <div className="fixed inset-0 flex items-center justify-center z-[999] pointer-events-none">

            <p className="text-orange-100 text-sm mt-1">You're on fire! Keep it up!</p>
          </div>
        </div>
      )}
    </>
  );
};
